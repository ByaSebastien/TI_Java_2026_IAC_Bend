name: cicd

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build
        run: mvn -B clean package -DskipTests
      - name: Publish
        run: |
          mkdir -p publish
          JAR_PATH=$(find target -maxdepth 1 -type f -name "*.jar" ! -name "*.jar.original" | head -n 1)
          test -n "$JAR_PATH"
          cp "$JAR_PATH" publish/app.jar
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: spring-boot-artifact
          path: ./publish/app.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: spring-boot-artifact
          path: ./publish
      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ti-java-2026-web-app'
          package: './publish/app.jar'